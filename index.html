<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customising Bootstrap</title>
    <link rel="stylesheet" href="styles/css/style.css" />
  </head>
  <body class="p-4">

    <!-- Task 3: Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar mb-5">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Brand</a>
        <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row g-4">

        <!-- Task 1: Forgot Password Form -->
        <div class="col-12 col-lg-6">
          <div class="forgot-form">
            <h1>Forgot Password</h1>
            <p>Enter your email address and we'll send you
               instructions to reset your password.</p>
            <form>
              <div class="mb-3">
                <label for="resetEmail" class="form-label">
                  Email address
                </label>
                <input type="email" class="form-control"
                  id="resetEmail" placeholder="name@example.com" />
              </div>
              <button type="submit" class="btn btn-primary">
                Reset Password
              </button>
            </form>
          </div>
        </div>

        <!-- Task 2: Dark Contact Form -->
        <div class="col-12 col-lg-6">
          <div class="dark-form-wrapper">
            <div class="dark-form">
              <h2>Contact Us</h2>
              <form>
                <div class="mb-3">
                  <label for="contactName" class="form-label">Name</label>
                  <input type="text" class="form-control"
                    id="contactName" placeholder="Your name" />
                </div>
                <div class="mb-3">
                  <label for="contactEmail" class="form-label">Email</label>
                  <input type="email" class="form-control"
                    id="contactEmail" placeholder="your@email.com" />
                </div>
                <div class="mb-4">
                  <label for="contactMessage" class="form-label">Message</label>
                  <textarea class="form-control" id="contactMessage"
                    rows="4" placeholder="Your message"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                  Send Message
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Task 4: Profile Badge -->
        <div class="col-12">
          <div style="background: #121212; padding: 1.5rem;
            border-radius: 0.75rem; display: inline-block;">
            <div class="profile-badge">
              <img src="https://placehold.co/60x60"
                class="profile-badge-avatar" alt="Alex Johnson" />
              <div class="profile-badge-info">
                <p class="profile-badge-name">Alex Johnson</p>
                <span class="profile-badge-status">Online</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Bootstrap JS для навбара -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js">
    </script>
  </body>
</html>
